<script src="data/products.js"></script>
<script src="data/admin-seed.js"></script>
<script src="assets/admin-charts.js"></script>
<script src="assets/admin-store.js"></script>
<script src="assets/admin.js"></script>
<script>
(function () {
  "use strict";
  var S = window.AdminStore;
  function el(id) { return document.getElementById(id); }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }
  function fmtDate(iso) { return window.AdminStore.formatDate(iso); }
  function imgFallback(name) {
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><rect width="120" height="120" fill="#6b4a2e"/><text x="50%" y="56%" fill="#efe7da" font-size="46" text-anchor="middle" font-family="Georgia">' + esc((name || "?").charAt(0)) + '</text></svg>';
    return "data:image/svg+xml," + encodeURIComponent(svg);
  }
  var STAT_LABEL = { in: "In Stock", low: "Low Stock", out: "Out of Stock" };

  var params = new URLSearchParams(location.search);
  var id = params.get("id");

  function renderHistory(movements) {
    if (!movements.length) return '<tr><td colspan="5" class="empty">No stock movements recorded yet.</td></tr>';
    return movements.map(function (m) {
      var badge = m.type === "in"
        ? '<span class="mv-badge mv-in">▲ Stock In</span>'
        : '<span class="mv-badge mv-out">▼ Stock Out</span>';
      var qty = (m.type === "in" ? "+" : "−") + m.qty;
      return '<tr><td>' + fmtDate(m.date) + '</td>' +
        '<td>' + badge + '</td>' +
        '<td style="text-align:right"><b>' + qty + '</b></td>' +
        '<td><span class="ref">' + esc(m.reference || "—") + '</span></td>' +
        '<td>' + esc(m.updatedBy || "—") + '</td></tr>';
    }).join("");
  }

  function render(item, product, movements) {
    var img = item.image || imgFallback(item.name);
    el("prodTitle").textContent = item.name;
    el("crumbLast").textContent = item.name;
    el("prodSub").textContent = (product.species ? product.species + " · " : "") + "SKU " + (item.sku || "—");
    el("prodActions").innerHTML =
      '<a class="abtn abtn--ghost" href="admin-product-form.html?id=' + encodeURIComponent(item.id) + '">Edit Product</a>' +
      '<a class="abtn abtn--primary" href="admin-stock-movement.html?product=' + encodeURIComponent(item.id) + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Record Movement</a>';

    el("detailRoot").innerHTML =
      '<div class="dash-grid">' +
        '<div class="panel">' +
          '<div class="panel-head"><h2>Product Information</h2></div>' +
          '<div class="panel-body">' +
            '<div class="prod-head"><img class="prod-img" src="' + esc(img) + '" alt="" onerror="this.onerror=null;this.src=\'' + imgFallback(item.name) + '\'">' +
            '<div><div class="prod-name">' + esc(item.name) + '</div><span class="pill pill--' + item.status + '">' + STAT_LABEL[item.status] + '</span></div></div>' +
            '<div class="statlist">' +
              '<div class="srow"><span>Product Name</span><b>' + esc(item.name) + '</b></div>' +
              '<div class="srow"><span>SKU</span><b>' + esc(item.sku || "—") + '</b></div>' +
              '<div class="srow"><span>Category</span><b>' + esc(S.catName(item.category)) + '</b></div>' +
              '<div class="srow"><span>Unit</span><b>' + esc(item.unit) + '</b></div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="panel">' +
          '<div class="panel-head"><h2>Current Inventory</h2></div>' +
          '<div class="panel-body">' +
            '<div class="statlist">' +
              '<div class="srow"><span>Current Stock</span><b style="font-family:var(--font-head);font-size:18px">' + item.stock.toLocaleString("en-US") + ' ' + esc(item.unit) + '</b></div>' +
              '<div class="srow"><span>Minimum Stock Level</span><b>' + item.minStock.toLocaleString("en-US") + '</b></div>' +
              '<div class="srow"><span>Reserved (open orders)</span><b>' + item.reserved.toLocaleString("en-US") + '</b></div>' +
              '<div class="srow"><span>Stock Value</span><b>' + S.money(item.value) + '</b></div>' +
              '<div class="srow"><span>Stock Status</span><b><span class="pill pill--' + item.status + '">' + STAT_LABEL[item.status] + '</span></b></div>' +
            '</div>' +
            (item.status !== "in" ? '<div class="inline-alert">⚠ Stock is at or below the minimum level — consider restocking.</div>' : '') +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="panel">' +
        '<div class="panel-head"><h2>Stock Movement History</h2></div>' +
        '<div class="panel-body" style="padding:0"><div class="table-wrap">' +
          '<table class="atable"><thead><tr><th>Date</th><th>Movement Type</th><th style="text-align:right">Quantity</th><th>Reference</th><th>Updated By</th></tr></thead>' +
          '<tbody>' + renderHistory(movements) + '</tbody></table>' +
        '</div></div>' +
      '</div>';
  }

  if (!id) { el("detailRoot").innerHTML = '<div class="panel"><div class="panel-body"><div class="empty">No product specified. <a href="admin-inventory.html">Back to Inventory</a></div></div></div>'; return; }

  S.init().then(function () {
    var item = S.getInventoryItem(id), product = S.getProduct(id);
    if (!item || !product) {
      el("detailRoot").innerHTML = '<div class="panel"><div class="panel-body"><div class="empty">Product not found. <a href="admin-inventory.html">Back to Inventory</a></div></div></div>';
      return null;
    }
    return S.getMovements(id).then(function (movements) { render(item, product, movements || []); });
  });
})();
</script>
