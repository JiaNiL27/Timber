      <a href="admin-products.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.3 7 12 12l8.7-5M12 22V12"/></svg> Products</a>
      <a href="admin-inventory.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4"/></svg> Inventory</a>

      <a href="admin-quotes.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg> RFQ &amp; Quotes</a>
      <a href="admin-customers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg> Customers</a>

  <div class="admin-main">
    <header class="admin-topbar">
      <button class="hamburger" aria-label="Menu">&#9776;</button>
      <div class="topbar-spacer"></div>
      <div class="topbar-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="custSearch" placeholder="Search customers…" aria-label="Search customers">
      </div>
      <div class="user-chip"><span class="ava">SA</span><span class="meta"><b>Sawmill Admin</b><small>Manager</small></span></div>
    </header>

    <main class="admin-content">
      <nav class="crumbs" aria-label="Breadcrumb">
        <a href="admin-dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg></a>
        <span class="sep">›</span><b>Customers</b>
      </nav>
      <div class="page-head">
        <div class="ph-titles"><h1>Customers</h1><p class="welcome">Everyone who has ordered, with their lifetime value.</p></div>
        <div class="ph-actions">
          <select class="sel" id="sortBy">
            <option value="spent">Top spenders</option>
            <option value="orders">Most orders</option>
            <option value="recent">Most recent</option>
            <option value="name">Name (A–Z)</option>
          </select>
        </div>
      </div>

      <div class="panel">
        <div class="table-wrap">
          <table class="atable">
            <thead><tr><th>No</th><th>Customer</th><th>Company</th><th>Order IDs</th><th>Last order</th><th style="text-align:right">Total spent</th></tr></thead>
            <tbody id="custRows"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../data/products.js"></script>
<script src="../data/admin-seed.js"></script>
<script src="../assets/admin-store.js"></script>
<script src="../assets/admin.js"></script>
<script>
(function () {
  "use strict";
  var S = window.AdminStore, UI = window.AdminUI;
  function el(id) { return document.getElementById(id); }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }
  function fmtDate(iso) { return window.AdminStore.formatDate(iso); }
  function pill(s) { return s ? '<span class="pill pill--' + s + '">' + (s.charAt(0).toUpperCase() + s.slice(1)) + '</span>' : "—"; }
  function initials(name) { return (name || "?").split(/\s+/).map(function (w) { return w.charAt(0); }).join("").slice(0, 2).toUpperCase(); }

  var curSearch = "", curSort = "spent";

  function sortFn(a, b) {
    if (curSort === "orders") return b.orders - a.orders;
    if (curSort === "recent") return (b.last || "").localeCompare(a.last || "");
    if (curSort === "name") return (a.name || "").localeCompare(b.name || "");
    return b.spent - a.spent;
  }

  function render() {
    var rows = S.getCustomers().filter(function (c) {
      if (!curSearch) return true;
      var f = curSearch.toLowerCase();
      return (c.name + " " + c.email + " " + c.company).toLowerCase().indexOf(f) > -1;
    }).sort(sortFn);

    if (!rows.length) { el("custRows").innerHTML = '<tr><td colspan="6" class="empty">' + (S.isDbBacked() ? "No customers yet — they appear here once orders are placed." : "Offline — start the server to load customers from the database.") + '</td></tr>'; return; }
    el("custRows").innerHTML = rows.map(function (c, index) {
      var orderIds = (c.orderList || []).map(function (o) { return o.id; }).join(", ");
      return '<tr data-email="' + esc(c.email || c.key) + '" style="cursor:pointer">' +
        '<td style="text-align:center;color:#999;font-size:14px">' + (index + 1) + '</td>' +
        '<td><div class="cust-line"><b>' + esc(c.name) + '</b><small>' + esc(c.email || "—") + '</small></div></td>' +
        '<td>' + esc(c.company || "—") + '</td>' +
        '<td style="font-size:13px">' + (orderIds || "—") + '</td>' +
        '<td>' + fmtDate(c.last) + '</td>' +
        '<td style="text-align:right"><span class="amt">' + S.money2(c.spent) + '</span></td></tr>';
    }).join("");
    document.querySelectorAll("#custRows tr[data-email]").forEach(function (tr) {
      tr.addEventListener("click", function () { openProfile(tr.dataset.email); });
    });
  }

  function openProfile(email) {
    var c = S.getCustomer(email);
    if (!c) return;
    var orders = (c.orderList || []).map(function (o) {
      return '<tr><td><span class="ref" style="font-size:13px">' + esc(o.id) + '</span></td><td>' + fmtDate(o.date) + '</td><td>' + pill(o.status) + '</td><td class="num">' + S.money2(o.total) + '</td></tr>';
    }).join("");
    var body =
      '<div class="detail-sec"><h3>Contact details</h3><div class="dl">' +
        '<div class="row"><span>Name</span><b>' + esc(c.name) + '</b></div>' +
        '<div class="row"><span>Email</span><b>' + esc(c.email || "—") + '</b></div>' +
        '<div class="row"><span>Phone</span><b>' + esc(c.phone || "—") + '</b></div>' +
        (c.company ? '<div class="row"><span>Company</span><b>' + esc(c.company) + '</b></div>' : "") +
        '<div class="row"><span>Address</span><b>' + esc(c.address || "—") + '</b></div>' +
      '</div></div>' +
      '<div class="detail-sec"><h3>Lifetime value</h3><div class="dl">' +
        '<div class="row"><span>Total revenue generated</span><b style="color:var(--amber-dark);font-family:var(--font-head);font-size:18px">' + S.money2(c.spent) + '</b></div>' +
        '<div class="row"><span>Orders</span><b>' + c.orders + '</b></div>' +
        '<div class="row"><span>Average order</span><b>' + S.money2(c.avg) + '</b></div>' +
        '<div class="row"><span>First order</span><b>' + fmtDate(c.first) + '</b></div>' +
        '<div class="row"><span>Last order</span><b>' + fmtDate(c.last) + '</b></div>' +
      '</div></div>' +
      '<div class="detail-sec"><h3>Order history</h3>' +
        '<table class="ditems"><thead><tr><th>Order</th><th>Date</th><th>Status</th><th class="num">Total</th></tr></thead>' +
        '<tbody>' + (orders || '<tr><td colspan="4" class="empty">No orders.</td></tr>') + '</tbody></table></div>';
    var foot = '<button class="abtn abtn--ghost" onclick="AdminUI.closeDrawer()">Close</button><a class="abtn abtn--primary" href="admin-orders.html">View in Orders</a>';
    UI.openDrawer(c.name || "Customer", body, foot);
  }

  el("custSearch").addEventListener("input", function (e) { curSearch = e.target.value.trim(); render(); });
  el("sortBy").addEventListener("change", function (e) { curSort = e.target.value; render(); });

  S.init().then(render);
})();
</script>
</body>
</html>
