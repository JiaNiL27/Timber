<script src="../data/products.js"></script>

<script src="../assets/admin-charts.js"></script>
<script src="../assets/admin-store.js"></script>
<script src="../assets/admin.js"></script>
<script>
(function () {
  "use strict";
  var S = window.AdminStore, UI = window.AdminUI;
  function el(id) { return document.getElementById(id); }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }
  function imgFallback(name) {
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160"><rect width="240" height="160" fill="#6b4a2e"/><text x="50%" y="54%" fill="#efe7da" font-size="20" text-anchor="middle" font-family="Georgia">' + esc(name || "Timber") + '</text></svg>';
    return "data:image/svg+xml," + encodeURIComponent(svg);
  }
  var STAT_LABEL = { in: "In Stock", low: "Low Stock", out: "Out of Stock" };

  /* ---------- category filter options ---------- */
  el("catFilter").innerHTML = '<option value="">All Categories</option>' +
    S.getCategories().map(function (c) { return '<option value="' + esc(c.id) + '">' + esc(c.name) + '</option>'; }).join("");

  /* ---------- products grid ---------- */
  var openMenu = null;
  function statusOf(invMap, id) { return (invMap[id] || {}).status || "in"; }

  function renderProducts() {
    var q = el("prodSearch").value.trim().toLowerCase();
    var cat = el("catFilter").value, st = el("statusFilter").value;
    var sales = S.salesByProduct();
    var invMap = {}; S.getInventory().forEach(function (i) { invMap[i.id] = i; });

    var list = S.getProducts().filter(function (p) {
      if (cat && p.category !== cat) return false;
      if (st && statusOf(invMap, p.id) !== st) return false;
      if (q && (p.name + " " + (p.sku || "")).toLowerCase().indexOf(q) < 0) return false;
      return true;
    });

    if (!list.length) { el("productGrid").innerHTML = '<div class="empty" style="grid-column:1/-1">No products match your filters.</div>'; return; }

    el("productGrid").innerHTML = list.map(function (p) {
      var inv = invMap[p.id] || { status: "in" };
      var img = p.image || imgFallback(p.name);
      var price = p.type === "quote-only" || p.price == null ? "Quote" : S.money2(p.price);
      var sold = (sales[p.id] && sales[p.id].qty) || 0;
      return '<div class="pcard" data-id="' + esc(p.id) + '">' +
        '<div class="pcard-media"><img src="' + esc(img) + '" alt="" onerror="this.onerror=null;this.src=\'' + imgFallback(p.name) + '\'">' +
        '<button class="pcard-menu-btn" aria-label="Actions">&#8942;</button>' +
        '<div class="pcard-menu"><button class="act-edit">Edit</button><button class="act-delete danger">Delete</button></div></div>' +
        '<div class="pcard-body">' +
        '<div class="pcard-name">' + esc(p.name) + '</div>' +
        '<div class="pcard-sub">' + esc(S.catName(p.category)) + ' • ' + esc(p.sku || "—") + '</div>' +
        '<div class="pcard-row"><span class="pcard-price">' + price + '</span><span class="pill pill--' + inv.status + '">' + STAT_LABEL[inv.status] + '</span></div>' +
        '<div class="pcard-stats"><span>Stock: <b>' + (p.stock || 0) + ' ' + esc(p.unit || "units") + '</b></span><span>Sold: <b>' + sold + '</b></span></div>' +
        '</div></div>';
    }).join("");

    // wire card menus
    document.querySelectorAll(".pcard").forEach(function (card) {
      var id = card.dataset.id;
      var btn = card.querySelector(".pcard-menu-btn"), menu = card.querySelector(".pcard-menu");
      btn.addEventListener("click", function (e) {
        e.stopPropagation();
        if (openMenu && openMenu !== menu) openMenu.classList.remove("is-open");
        menu.classList.toggle("is-open"); openMenu = menu.classList.contains("is-open") ? menu : null;
      });
      card.querySelector(".act-edit").addEventListener("click", function () { location.href = "admin-product-form.html?id=" + encodeURIComponent(id); });
      card.querySelector(".act-delete").addEventListener("click", function () {
        if (confirm("Delete this product permanently?")) {
          S.deleteProduct(id).then(function () { UI.toast("Product deleted."); renderProducts(); })
            .catch(function (e) { UI.toast("Delete failed: " + e.message); });
        }
      });
    });
  }
  document.addEventListener("click", function () { if (openMenu) { openMenu.classList.remove("is-open"); openMenu = null; } });

  el("prodSearch").addEventListener("input", renderProducts);
  el("catFilter").addEventListener("change", renderProducts);
  el("statusFilter").addEventListener("change", renderProducts);

  S.init().then(function () { renderProducts(); });
})();
</script>
