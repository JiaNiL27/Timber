<script src="data/products.js"></script>
<script src="data/admin-seed.js"></script>
<script src="assets/admin-store.js"></script>
<script src="assets/admin.js"></script>
<script>
(function () {
  "use strict";
  var S = window.AdminStore, UI = window.AdminUI;
  function el(id) { return document.getElementById(id); }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }
  function qp(n) { return new URLSearchParams(location.search).get(n); }
  function fmtDate(iso) { return window.AdminStore.formatDate(iso); }
  function fmtDateTime(iso) { if (!iso) return ""; var d = new Date(iso); return isNaN(d) ? "" : d.toLocaleString("en-US", { day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" }); }
  function dayKey(iso) { if (!iso) return ""; var d = new Date(iso); if (isNaN(d)) return ""; return d.getFullYear() + "-" + ("0" + (d.getMonth() + 1)).slice(-2) + "-" + ("0" + d.getDate()).slice(-2); }

  var LABELS = { pending: "Pending", confirmed: "Confirmed", processing: "Processing", ready: "Ready for Delivery", delivered: "Delivered", completed: "Completed", cancelled: "Cancelled" };
  function pill(s) { return s ? '<span class="pill pill--' + s + '">' + (LABELS[s] || s) + '</span>' : "—"; }
  function opts(values, sel) { return values.map(function (v) { return '<option value="' + v + '"' + (v === sel ? " selected" : "") + '>' + (LABELS[v] || (v.charAt(0).toUpperCase() + v.slice(1))) + '</option>'; }).join(""); }

  var STEPS = [
    { key: "pending",    label: "Order Submitted" },
    { key: "confirmed",  label: "Confirmed" },
    { key: "processing", label: "Processing" },
    { key: "ready",      label: "Ready for Delivery" },
    { key: "delivered",  label: "Delivered" },
    { key: "completed",  label: "Completed" }
  ];
  // contextual workflow buttons: shown only when valid for the current status
  var ACTIONS = [
    { status: "confirmed",  label: "Confirm Order",            from: ["pending"] },
    { status: "processing", label: "Start Processing",         from: ["confirmed"] },
    { status: "ready",      label: "Mark Ready for Delivery",  from: ["processing"] },
    { status: "delivered",  label: "Mark Delivered",           from: ["ready"] },
    { status: "completed",  label: "Complete Order",           from: ["delivered"] },
    { status: "cancelled",  label: "Cancel Order",             from: ["pending", "confirmed", "processing", "ready", "delivered"], danger: true }
  ];

  var orderId = qp("id");

  function timeline(o) {
    var cancelled = o.status === "cancelled";
    var curIdx = -1;
    STEPS.forEach(function (st, i) { if (st.key === o.status) curIdx = i; });
    var timeMap = {};
    (o.history || []).forEach(function (h) { if (!(h.status in timeMap)) timeMap[h.status] = { at: h.at, note: h.note }; });

    var lis = STEPS.map(function (st, i) {
      var cls = "", marker = "○";
      if (cancelled) {
        if (timeMap[st.key]) { cls = "is-done"; marker = "✓"; }
      } else if (i < curIdx) { cls = "is-done"; marker = "✓"; }
      else if (i === curIdx) { cls = "is-current"; marker = "●"; }
      var info = timeMap[st.key];
      var when = (info && info.at) || (st.key === "pending" ? o.date : null);
      var note = info && info.note ? '<span class="tl-note">' + esc(info.note) + '</span>' : "";
      return '<li class="' + cls + '"><span class="tl-dot">' + marker + '</span>' +
        '<span class="tl-title">' + st.label + '</span>' +
        (when ? '<span class="tl-time">' + fmtDateTime(when) + '</span>' : "") + note + '</li>';
    });
    if (cancelled) {
      var c = timeMap.cancelled;
      lis.push('<li class="is-cancelled"><span class="tl-dot">✕</span><span class="tl-title">Cancelled</span>' +
        (c && c.at ? '<span class="tl-time">' + fmtDateTime(c.at) + '</span>' : "") +
        (c && c.note ? '<span class="tl-note">' + esc(c.note) + '</span>' : "") + '</li>');
    }
    return '<ul class="timeline">' + lis.join("") + '</ul>';
  }

  function actionButtons(o) {
    var avail = ACTIONS.filter(function (a) { return a.from.indexOf(o.status) > -1; });
    if (!avail.length) return '<p class="empty" style="padding:14px 0">No further action — this order is ' + (LABELS[o.status] || o.status) + '.</p>';
    return '<div class="od-actions">' + avail.map(function (a) {
      return '<button class="abtn ' + (a.danger ? "abtn--danger" : "abtn--primary") + '" data-action="' + a.status + '">' + a.label + '</button>';
    }).join("") + '</div>';
  }

  function render(o) {
    el("crumbId").textContent = "Order " + o.id;
    el("odTitle").textContent = "Order " + o.id;
    el("odSub").textContent = fmtDate(o.date) + " · " + (LABELS[o.status] || o.status);

    var sh = o.ship || {};
    var addr = [sh.address, sh.city, sh.postcode, sh.state, sh.country].filter(Boolean).join(", ") || "—";
    var pay = o.payment || { method: o.paymentMethod, status: o.paymentStatus };

    var items = (o.items || []).map(function (it) {
      var unit = it.unit != null ? it.unit : (it.qty ? it.total / it.qty : 0);
      return '<tr><td>' + esc(it.name) + '</td><td class="num" style="text-align:right">' + it.qty +
        '</td><td class="num" style="text-align:right">' + S.money2(unit) +
        '</td><td class="num" style="text-align:right">' + S.money2(it.total) + '</td></tr>';
    }).join("") || '<tr><td colspan="4" class="empty">No items.</td></tr>';

    var left =
      '<div class="panel"><div class="panel-head"><h2>Customer Information</h2></div><div class="panel-body"><div class="dl">' +
        '<div class="row"><span>Name</span><b>' + esc(o.customerName) + '</b></div>' +
        '<div class="row"><span>Email</span><b>' + esc(o.customerEmail || "—") + '</b></div>' +
        '<div class="row"><span>Phone</span><b>' + esc(o.phone || "—") + '</b></div>' +
        (o.company ? '<div class="row"><span>Company</span><b>' + esc(o.company) + '</b></div>' : "") +
      '</div></div></div>' +

      '<div class="panel"><div class="panel-head"><h2>Order Information</h2></div><div class="panel-body"><div class="dl">' +
        '<div class="row"><span>Order ID</span><b>' + esc(o.id) + '</b></div>' +
        '<div class="row"><span>Order date</span><b>' + fmtDate(o.date) + '</b></div>' +
        '<div class="row"><span>Status</span><b>' + pill(o.status) + '</b></div>' +
        '<div class="row"><span>Total</span><b>' + S.money2(o.total) + '</b></div>' +
      '</div></div></div>' +

      '<div class="panel"><div class="panel-head"><h2>Product List</h2></div><div class="panel-body"><div class="table-wrap">' +
        '<table class="atable"><thead><tr><th>Product</th><th style="text-align:right">Qty</th><th style="text-align:right">Unit</th><th style="text-align:right">Subtotal</th></tr></thead>' +
        '<tbody>' + items + '</tbody>' +
        '<tfoot><tr><td colspan="3" style="text-align:right">Total</td><td class="num" style="text-align:right;color:var(--amber-dark)">' + S.money2(o.total) + '</td></tr></tfoot>' +
        '</table></div></div></div>' +

      '<div class="panel"><div class="panel-head"><h2>Payment Summary</h2></div><div class="panel-body"><div class="dl">' +
        '<div class="row"><span>Method</span><b>' + esc((pay.method || "—").toUpperCase()) + '</b></div>' +
        '<div class="row"><span>Status</span><b>' + pill(pay.status) + '</b></div>' +
        '<div class="row"><span>Amount</span><b>' + S.money2(pay.amount != null ? pay.amount : o.total) + '</b></div>' +
        (pay.transactionId ? '<div class="row"><span>Transaction</span><b>' + esc(pay.transactionId) + '</b></div>' : "") +
      '</div></div></div>' +

      '<div class="panel"><div class="panel-head"><h2>Delivery Information</h2></div><div class="panel-body">' +
        '<div class="dl">' +
          '<div class="row"><span>Method</span><b>' + (o.deliveryMethod === "collect" ? "Self-collect" : "Delivery") + '</b></div>' +
          '<div class="row"><span>Address</span><b>' + esc(addr) + '</b></div>' +
        '</div>' +
        '<div class="od-filters" style="margin-top:16px">' +
          '<div class="field"><label for="odEst">Estimated delivery</label><input type="date" id="odEst" value="' + (dayKey(o.estDelivery) || "") + '"></div>' +
          '<button class="abtn abtn--primary abtn--sm" id="odSaveDelivery" type="button">Save delivery date</button>' +
        '</div>' +
      '</div></div>' +

      '<div class="panel"><div class="panel-head"><h2>Admin Notes</h2></div><div class="panel-body">' +
        '<div class="field"><textarea id="odNotes" rows="4" placeholder="Internal notes about this order…">' + esc(o.notes || "") + '</textarea></div>' +
        '<button class="abtn abtn--primary abtn--sm" id="odSaveNotes" type="button">Save notes</button>' +
      '</div></div>';

    var right =
      '<div class="panel"><div class="panel-head"><h2>Update Status</h2></div><div class="panel-body">' +
        actionButtons(o) +
      '</div></div>' +
      '<div class="panel"><div class="panel-head"><h2>Order Timeline</h2></div><div class="panel-body">' +
        timeline(o) +
      '</div></div>';

    el("odRoot").innerHTML = '<div class="order-grid"><div class="stack">' + left + '</div><div class="stack">' + right + '</div></div>';

    // wire status actions
    document.querySelectorAll("[data-action]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var status = btn.getAttribute("data-action");
        if (status === "cancelled" && !window.confirm("Cancel this order? The customer will be notified.")) return;
        document.querySelectorAll("[data-action]").forEach(function (b) { b.disabled = true; });
        S.updateOrder(o.id, { status: status }).then(function (res) {
          UI.toast(res && res.notified ? "Status updated — customer emailed." : "Status updated.");
          load();
        }).catch(function (e) { UI.toast(e.message); document.querySelectorAll("[data-action]").forEach(function (b) { b.disabled = false; }); });
      });
    });
    // wire delivery save (no email — not a status change)
    el("odSaveDelivery").addEventListener("click", function () {
      this.disabled = true;
      S.updateOrder(o.id, { estDelivery: el("odEst").value || "" })
        .then(function () { UI.toast("Delivery date saved."); load(); })
        .catch(function (e) { UI.toast(e.message); el("odSaveDelivery").disabled = false; });
    });
    // wire notes save
    el("odSaveNotes").addEventListener("click", function () {
      this.disabled = true;
      S.updateOrder(o.id, { notes: el("odNotes").value })
        .then(function () { UI.toast("Notes saved."); el("odSaveNotes").disabled = false; })
        .catch(function (e) { UI.toast(e.message); el("odSaveNotes").disabled = false; });
    });
  }

  function load() {
    if (!orderId) { el("odRoot").innerHTML = '<div class="panel"><div class="panel-body"><p class="empty">No order specified.</p></div></div>'; return; }
    S.getOrderDetail(orderId).then(function (o) {
      if (!o) { el("odRoot").innerHTML = '<div class="panel"><div class="panel-body"><p class="empty">' + (S.isDbBacked() ? "Order not found." : "Offline — start the server to load this order from the database.") + '</p></div></div>'; return; }
      render(o);
    });
  }

  S.init().then(load);
})();
</script>
