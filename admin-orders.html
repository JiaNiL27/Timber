      <div class="panel">
        <div class="panel-body">
          <div class="od-filters">
            <div class="field"><label for="fStatus">Status</label>
              <select class="sel" id="fStatus">
                <option value="">All statuses</option>
                <option value="pending">Pending</option>
                <option value="confirmed">Confirmed</option>
                <option value="processing">Processing</option>
                <option value="ready">Ready for Delivery</option>
                <option value="delivered">Delivered</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
            <div class="field"><label for="fFrom">From date</label><input type="date" id="fFrom"></div>
            <div class="field"><label for="fTo">To date</label><input type="date" id="fTo"></div>
            <button class="abtn abtn--ghost abtn--sm" id="fClear" type="button">Clear filters</button>
          </div>
          <div class="table-wrap">
            <table class="atable">
              <thead><tr><th>Order ID</th><th>Customer</th><th>Date</th><th style="text-align:right">Total</th><th>Status</th><th style="text-align:right">Action</th></tr></thead>
              <tbody id="orderRows"></tbody>

          </div>
        </div>

<script src="assets/admin-store.js"></script>
<script src="assets/admin.js"></script>
<script>
(function () {
  "use strict";
  var S = window.AdminStore;
  function el(id) { return document.getElementById(id); }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }
  function fmtDate(iso) { return window.AdminStore.formatDate(iso); }
  var LABELS = { pending: "Pending", confirmed: "Confirmed", processing: "Processing", ready: "Ready for Delivery", delivered: "Delivered", completed: "Completed", cancelled: "Cancelled" };
  function pill(s) { return s ? '<span class="pill pill--' + s + '">' + (LABELS[s] || s) + '</span>' : "—"; }
  // local YYYY-MM-DD (matches the <input type="date"> value, so date filtering is timezone-safe)
  function dayKey(iso) { if (!iso) return ""; var d = new Date(iso); if (isNaN(d)) return ""; return d.getFullYear() + "-" + ("0" + (d.getMonth() + 1)).slice(-2) + "-" + ("0" + d.getDate()).slice(-2); }

  function render() {
    var search = (el("orderSearch") && el("orderSearch").value.trim().toLowerCase()) || "";
    var fStatus = el("fStatus").value, from = el("fFrom").value, to = el("fTo").value;
    var rows = S.getOrders().filter(function (o) {
      if (fStatus && o.status !== fStatus) return false;
      if (search && (o.id + " " + o.customerName + " " + o.company + " " + o.customerEmail).toLowerCase().indexOf(search) < 0) return false;
      var k = dayKey(o.date);
      if (from && (!k || k < from)) return false;
      if (to && (!k || k > to)) return false;
      return true;
    });
    if (!rows.length) { el("orderRows").innerHTML = '<tr><td colspan="6" class="empty">' + (S.isDbBacked() ? "No orders match these filters." : "Offline — start the server to load orders from the database.") + '</td></tr>'; return; }
    el("orderRows").innerHTML = rows.map(function (o) {
      return '<tr>' +
        '<td><span class="ref">' + esc(o.id) + '</span></td>' +
        '<td><div class="cust-line"><b>' + esc(o.customerName) + '</b><small>' + esc(o.company || o.customerEmail) + '</small></div></td>' +
        '<td>' + fmtDate(o.date) + '</td>' +
        '<td style="text-align:right"><span class="amt">' + S.money2(o.total) + '</span></td>' +
        '<td>' + pill(o.status) + '</td>' +
        '<td style="text-align:right"><a class="abtn abtn--ghost abtn--sm" href="admin-order.html?id=' + encodeURIComponent(o.id) + '">View</a></td>' +
        '</tr>';
    }).join("");
  }

  var s = el("orderSearch"); if (s) s.addEventListener("input", render);
  el("fStatus").addEventListener("change", render);
  el("fFrom").addEventListener("change", render);
  el("fTo").addEventListener("change", render);
  el("fClear").addEventListener("click", function () { el("fStatus").value = ""; el("fFrom").value = ""; el("fTo").value = ""; if (s) s.value = ""; render(); });

  S.init().then(render);
})();
</script>
